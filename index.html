<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мустафин Айнур · Генеральный директор AMIT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=TikTok+Sans:opsz,wght@12..36,400;12..36,500;12..36,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0f161c;
            --white: #fbf5f5;
            --blue: #b5d2e7;
            --light-blue: #d8e4ee;
            --deep-blue: #345169;
            --grey: #6D7E8D;
            --font-head: "TikTok Sans", "Segoe UI", system-ui, sans-serif;
            --font-body: "Manrope", "Segoe UI", system-ui, sans-serif;
        }

        * { box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            margin: 0;
            background: var(--black);
            color: var(--white);
            font-family: var(--font-body);
            -webkit-font-smoothing: antialiased;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 32px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Мягкое голубое свечение в фоне — как акценты на amit.partners */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                radial-gradient(620px 420px at 50% -10%, rgba(181,210,231,0.18), transparent 70%),
                radial-gradient(700px 500px at 110% 100%, rgba(52,81,105,0.35), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(216,228,238,0.10);
            border-radius: 28px;
            padding: 40px 32px 32px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 30px 80px -40px rgba(0,0,0,0.9);
        }

        .brand {
            height: 26px;
            width: auto;
            opacity: 0.95;
            margin-bottom: 36px;
        }

        .avatar-wrap {
            position: relative;
            width: 116px;
            height: 116px;
            margin: 0 auto 22px;
        }
        .avatar-wrap::after {
            content: "";
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 180deg, var(--blue), var(--deep-blue), var(--blue));
            z-index: -1;
            filter: blur(2px);
            opacity: 0.7;
        }
        .avatar {
            width: 116px;
            height: 116px;
            border-radius: 50%;
            object-fit: cover;
            object-position: 50% 14%; /* кадрируем по лицу (фото ростовое) */
            border: 2px solid rgba(216,228,238,0.25);
            background: #1a2630;
            display: block;
        }

        h1 {
            font-family: var(--font-head);
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin: 0 0 6px;
            line-height: 1.15;
        }

        .role {
            color: var(--blue);
            font-size: 0.95rem;
            font-weight: 500;
            margin: 0;
        }
        .company {
            color: var(--grey);
            font-size: 0.85rem;
            margin: 4px 0 0;
        }

        .links {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .button {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(216,228,238,0.05);
            color: var(--white);
            padding: 15px 18px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.97rem;
            border: 1px solid rgba(216,228,238,0.10);
            transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
        }
        .button:hover {
            background: rgba(181,210,231,0.12);
            border-color: rgba(181,210,231,0.35);
            transform: translateY(-2px);
        }
        .button .ico {
            flex: 0 0 22px;
            width: 22px;
            height: 22px;
            color: var(--blue);
        }
        .button .label { flex: 1; text-align: left; }
        .button .arrow {
            color: var(--grey);
            transition: transform 0.18s ease, color 0.18s ease;
        }
        .button:hover .arrow {
            color: var(--blue);
            transform: translateX(3px);
        }

        .footer {
            margin-top: 34px;
            font-size: 0.78rem;
            color: var(--grey);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .footer a { color: var(--blue); text-decoration: none; }
        .footer a:hover { text-decoration: underline; }

        @media (max-width: 380px) {
            .card { padding: 32px 22px 26px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
