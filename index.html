<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ваше Имя — Контакты</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .card {
            max-width: 400px;
            padding: 40px 20px;
            margin: 20px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #fff;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8em;
            margin: 0;
        }
        p {
            color: #aaa;
            margin: 10px 0 30px;
        }
        .button {
            display: block;
            background: #222;
            color: #fff;
            padding: 15px 20px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid #333;
            transition: background 0.2s;
        }
        .button:hover {
            background: #333;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- Замените ссылку на свою фотографию или оставьте заглушку -->
        <img class="avatar" src="https://via.placeholder.com/100" alt="Ваше фото">

        <h1>Ваше Имя Фамилия</h1>
        <p>Должность или слоган</p>

        <a class="button" href="https://t.me/yourusername">✈️ Telegram</a>
        <a class="button" href="https://wa.me/79031234567">💬 WhatsApp</a>
        <a class="button" href="mailto:you@example.com">📧 Email</a>

        <div class="footer">© 2026 — Приложи NFC ещё раз :)</div>
    </div>
</body>
</html>
